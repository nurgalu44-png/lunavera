<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunavera — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg1: #0a0a0f;
  --bg2: #141424;
  --text: #ffffff;
  --muted: #b0b0bb;
  --accent: #e6c8a0;
}

body {
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(1300px 700px at 80% 10%, #23233a 0%, transparent 70%),
              radial-gradient(900px 600px at 20% 90%, #1a1a2a 0%, transparent 70%),
              linear-gradient(145deg, var(--bg2), var(--bg1));
  position: relative;
  overflow: hidden;
}

/* BINTANG KEDIP (tetap ada agar tidak kosong) */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image: radial-gradient(2px 2px at 15px 40px, rgba(255,245,210,0.6) 1%, transparent 1%),
                    radial-gradient(1px 1px at 70px 120px, rgba(255,245,210,0.4) 1%, transparent 1%),
                    radial-gradient(2px 2px at 300px 80px, rgba(255,245,210,0.7) 1%, transparent 1%);
  background-size: 200px 200px, 150px 150px, 250px 250px;
  background-repeat: repeat;
  opacity: 0.4;
  animation: starTwinkle 5s infinite alternate;
}

@keyframes starTwinkle {
  0% { opacity: 0.2; }
  100% { opacity: 0.7; }
}

/* BULAN SABIT sesuai gambar WhatsApp: warna kuning keemasan, tipis, tanpa glow berlebihan */
.moon {
  position: absolute;
  top: 6%;
  right: 8%;
  width: 170px;
  height: 170px;
  border-radius: 50%;
  background: #f5d742;  /* warna dasar kuning keemasan seperti ikon WhatsApp */
  box-shadow: 0 0 4px rgba(0,0,0,0.2); /* bayangan minimal, tidak glow */
  z-index: 2;
  animation: moonFloat 6s ease-in-out infinite;
}

/* Bentuk sabit tipis dan runcing (mirip ikon WhatsApp) */
.moon::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: radial-gradient(circle at 75% 35%, var(--bg1) 35%, transparent 70%);
  mask: radial-gradient(circle at 75% 35%, transparent 22%, black 50%);
  -webkit-mask: radial-gradient(circle at 75% 35%, transparent 22%, black 50%);
  top: 0;
  left: 0;
}

/* Animasi melayang saja, tanpa denyut cahaya */
@keyframes moonFloat {
  0% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-10px) rotate(2deg); }
  100% { transform: translateY(0px) rotate(0deg); }
}

/* Container utama (glass) */
.wrap {
  position: relative;
  width: 90%;
  max-width: 480px;
  padding: 2.2rem 1.8rem;
  text-align: center;
  background: rgba(10, 10, 18, 0.5);
  backdrop-filter: blur(14px);
  border-radius: 56px;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
  z-index: 10;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 2.6rem;
  font-weight: 700;
  letter-spacing: 4px;
  background: linear-gradient(135deg, #fff, #e6d5b8);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.tag {
  margin-top: 8px;
  font-size: 0.85rem;
  color: var(--muted);
  letter-spacing: 1px;
}

.hr {
  margin: 22px auto 18px;
  width: 70px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), #c2a070, transparent);
  border-radius: 4px;
}

.head {
  font-size: 1.2rem;
  letter-spacing: 4px;
  font-weight: 500;
  color: #f2e8da;
  text-transform: uppercase;
}

.count {
  margin-top: 16px;
  font-size: 2rem;
  font-weight: 600;
  font-family: monospace;
  background: linear-gradient(120deg, #fff, #ddcca8);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.actions {
  margin-top: 32px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

.btn-main, .btn-secondary {
  width: 220px;
  padding: 12px;
  border-radius: 60px;
  text-decoration: none;
  font-weight: 500;
  transition: 0.25s ease;
  text-align: center;
}

.btn-main {
  background: rgba(255,255,245,0.08);
  border: 1px solid rgba(255,235,200,0.5);
  color: #fff3e0;
}

.btn-main:hover {
  background: #fff3e0;
  color: #0f0f1a;
  transform: scale(1.02);
}

.btn-secondary {
  background: rgba(20,20,35,0.7);
  border: 1px solid rgba(255,255,255,0.2);
  color: #cdcddf;
}

.btn-secondary:hover {
  background: rgba(230,200,160,0.2);
  border-color: #e6c8a0;
  color: #fff;
}

.footer {
  position: absolute;
  bottom: 18px;
  width: 100%;
  text-align: center;
  font-size: 0.7rem;
  color: #6a6a7c;
  z-index: 10;
}

@media (max-width: 560px) {
  .moon { width: 100px; height: 100px; top: 3%; right: 5%; }
  .logo { font-size: 2rem; }
  .count { font-size: 1.4rem; }
  .wrap { padding: 1.5rem; }
  .btn-main, .btn-secondary { width: 180px; }
}
</style>
</head>
<body>

<div class="moon"></div>

<div class="wrap">
  <div class="logo">LUNAVERA</div>
  <div class="tag">Quiet design. Clear presence.</div>
  <div class="hr"></div>
  <div class="head">COMING SOON</div>
  <div id="count" class="count">--d --h --m --s</div>
  <div class="actions">
    <a class="btn-main" href="https://instagram.com/" target="_blank">✨ Follow Instagram</a>
    <a class="btn-secondary" href="https://wa.me/6282336056882" target="_blank">📬 Notify WhatsApp</a>
  </div>
</div>

<div class="footer">© Lunavera — quiet presence</div>

<script>
const target = new Date("2027-06-01 00:00:00").getTime();
const el = document.getElementById("count");

setInterval(() => {
  const now = Date.now();
  const diff = target - now;
  if (diff <= 0) {
    el.innerHTML = "WE ARE LIVE";
    return;
  }
  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff / (1000*60*60)) % 24);
  const mins = Math.floor((diff / (1000*60)) % 60);
  const secs = Math.floor((diff / 1000) % 60);
  el.innerHTML = `${days}d ${hours}h ${mins}m ${secs}s`;
}, 1000);
</script>
</body>
</html>
