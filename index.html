<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Lunavera — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg1: #0a0a0f;
  --bg2: #141424;
  --accent: #e6c8a0;
}

body {
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(1300px 700px at 80% 10%, #23233a 0%, transparent 70%),
              radial-gradient(900px 600px at 20% 90%, #1a1a2a 0%, transparent 70%),
              linear-gradient(145deg, var(--bg2), var(--bg1));
  position: relative;
  overflow-x: hidden;
}

/* Bintang latar kedip (opsional, biar tidak kosong) */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: radial-gradient(2px 2px at 15px 40px, rgba(255,245,210,0.5) 1%, transparent 1%),
                    radial-gradient(1px 1px at 70px 120px, rgba(255,245,210,0.3) 1%, transparent 1%),
                    radial-gradient(2px 2px at 300px 80px, rgba(255,245,210,0.6) 1%, transparent 1%);
  background-size: 200px 200px, 150px 150px, 250px 250px;
  background-repeat: repeat;
  opacity: 0.4;
  animation: starTwinkle 5s infinite alternate;
}

@keyframes starTwinkle {
  0% { opacity: 0.2; }
  100% { opacity: 0.7; }
}

/* BULAN SABIT HITAM dengan pinggiran PUTIH */
.moon {
  position: absolute;
  top: 12%;
  left: 50%;
  transform: translateX(-50%);
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background: #000000;  /* hitam solid */
  box-shadow: 0 0 0 2px #ffffff; /* pinggiran putih rapi */
  z-index: 2;
  animation: moonFloat 6s ease-in-out infinite;
}

/* Membentuk sabit (bagian yang terpotong) */
.moon::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: radial-gradient(circle at 70% 35%, transparent 25%, #000 50%);
  mask: radial-gradient(circle at 70% 35%, transparent 20%, black 45%);
  -webkit-mask: radial-gradient(circle at 70% 35%, transparent 20%, black 45%);
  top: 0;
  left: 0;
}

@keyframes moonFloat {
  0% { transform: translateX(-50%) translateY(0px) rotate(0deg); }
  50% { transform: translateX(-50%) translateY(-10px) rotate(2deg); }
  100% { transform: translateX(-50%) translateY(0px) rotate(0deg); }
}

/* Container utama (glass) */
.wrap {
  position: relative;
  width: 90%;
  max-width: 480px;
  margin-top: 80px;
  padding: 2rem 1.5rem;
  text-align: center;
  background: rgba(10, 10, 18, 0.55);
  backdrop-filter: blur(14px);
  border-radius: 56px;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
  z-index: 10;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 2.4rem;
  font-weight: 700;
  letter-spacing: 4px;
  background: linear-gradient(135deg, #fff, #e6d5b8);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.tag {
  margin-top: 8px;
  font-size: 0.85rem;
  color: #b0b0bb;
  letter-spacing: 1px;
}

.hr {
  margin: 22px auto 18px;
  width: 70px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), #c2a070, transparent);
  border-radius: 4px;
}

.head {
  font-size: 1.1rem;
  letter-spacing: 4px;
  font-weight: 500;
  color: #f2e8da;
  text-transform: uppercase;
}

.count {
  margin-top: 16px;
  font-size: 1.8rem;
  font-weight: 600;
  font-family: monospace;
  background: linear-gradient(120deg, #fff, #ddcca8);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.actions {
  margin-top: 32px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

.btn-main, .btn-secondary {
  width: 220px;
  padding: 12px;
  border-radius: 60px;
  text-decoration: none;
  font-weight: 500;
  transition: 0.25s ease;
  text-align: center;
}

.btn-main {
  background: rgba(255,255,245,0.08);
  border: 1px solid rgba(255,235,200,0.5);
  color: #fff3e0;
}

.btn-main:hover {
  background: #fff3e0;
  color: #0f0f1a;
  transform: scale(1.02);
}

.btn-secondary {
  background: rgba(20,20,35,0.7);
  border: 1px solid rgba(255,255,255,0.2);
  color: #cdcddf;
}

.btn-secondary:hover {
  background: rgba(230,200,160,0.2);
  border-color: #e6c8a0;
  color: #fff;
}

.footer {
  position: absolute;
  bottom: 18px;
  width: 100%;
  text-align: center;
  font-size: 0.7rem;
  color: #6a6a7c;
  z-index: 10;
}

/* Responsif */
@media (max-width: 560px) {
  .moon {
    width: 100px;
    height: 100px;
    top: 8%;
  }
  .logo { font-size: 1.8rem; }
  .count { font-size: 1.4rem; }
  .wrap { margin-top: 70px; padding: 1.3rem; }
  .btn-main, .btn-secondary { width: 180px; }
}
</style>
</head>
<body>

<div class="moon" aria-label="Bulan sabit hitam dengan pinggiran putih"></div>

<div class="wrap">
  <div class="logo">LUNAVERA</div>
  <div class="tag">Quiet design. Clear presence.</div>
  <div class="hr"></div>
  <div class="head">COMING SOON</div>
  <div id="count" class="count">--d --h --m --s</div>
  <div class="actions">
    <a class="btn-main" href="https://instagram.com/" target="_blank">✨ Follow Instagram</a>
    <a class="btn-secondary" href="https://wa.me/6282336056882" target="_blank">📬 Notify WhatsApp</a>
  </div>
</div>

<div class="footer">© Lunavera — quiet presence</div>

<script>
const target = new Date("2027-06-01 00:00:00").getTime();
const el = document.getElementById("count");

setInterval(() => {
  const now = Date.now();
  const diff = target - now;
  if (diff <= 0) {
    el.innerHTML = "WE ARE LIVE";
    return;
  }
  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff / (1000*60*60)) % 24);
  const mins = Math.floor((diff / (1000*60)) % 60);
  const secs = Math.floor((diff / 1000) % 60);
  el.innerHTML = `${days}d ${hours}h ${mins}m ${secs}s`;
}, 1000);
</script>
</body>
  </html>
