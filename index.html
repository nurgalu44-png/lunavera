<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Lunavera — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg1: #0a0a0f;
  --bg2: #141424;
  --accent: #e6c8a0;
}

body {
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(1300px 700px at 80% 10%, #23233a 0%, transparent 70%),
              radial-gradient(900px 600px at 20% 90%, #1a1a2a 0%, transparent 70%),
              linear-gradient(145deg, var(--bg2), var(--bg1));
  position: relative;
  overflow-x: hidden;
}

/* Bintang latar kedip */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: radial-gradient(2px 2px at 15px 40px, rgba(255,245,210,0.6) 1%, transparent 1%),
                    radial-gradient(1px 1px at 70px 120px, rgba(255,245,210,0.4) 1%, transparent 1%),
                    radial-gradient(2px 2px at 300px 80px, rgba(255,245,210,0.7) 1%, transparent 1%),
                    radial-gradient(1px 1px at 550px 250px, rgba(255,245,210,0.5) 1%, transparent 1%);
  background-size: 200px 200px, 150px 150px, 250px 250px, 180px 180px;
  background-repeat: repeat;
  opacity: 0.5;
  animation: starTwinkle 6s infinite alternate;
}
@keyframes starTwinkle { 0% { opacity: 0.3; } 100% { opacity: 0.8; } }

/* SVG bulan sabit - hitam dengan stroke putih */
.moon-svg {
  position: absolute;
  top: 8%;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 120px;
  z-index: 5;
  animation: moonFloat 6s ease-in-out infinite;
  filter: drop-shadow(0 0 2px rgba(255,255,255,0.5));
}
.moon-svg svg {
  width: 100%;
  height: 100%;
  display: block;
}
@keyframes moonFloat {
  0% { transform: translateX(-50%) translateY(0px) rotate(0deg); }
  50% { transform: translateX(-50%) translateY(-12px) rotate(4deg); }
  100% { transform: translateX(-50%) translateY(0px) rotate(0deg); }
}

/* Container utama (glass) */
.wrap {
  position: relative;
  width: 90%;
  max-width: 480px;
  margin-top: 100px; /* ruang untuk bulan di atas */
  padding: 2rem 1.5rem;
  text-align: center;
  background: rgba(10, 10, 18, 0.55);
  backdrop-filter: blur(14px);
  border-radius: 56px;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
  z-index: 10;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 2.4rem;
  font-weight: 700;
  letter-spacing: 4px;
  background: linear-gradient(135deg, #fff, #e6d5b8);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.tag {
  margin-top: 8px;
  font-size: 0.85rem;
  color: #b0b0bb;
  letter-spacing: 1px;
}

.hr {
  margin: 22px auto 18px;
  width: 70px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), #c2a070, transparent);
  border-radius: 4px;
}

.head {
  font-size: 1.1rem;
  letter-spacing: 4px;
  font-weight: 500;
  color: #f2e8da;
  text-transform: uppercase;
}

.count {
  margin-top: 16px;
  font-size: 1.8rem;
  font-weight: 600;
  font-family: monospace;
  background: linear-gradient(120deg, #fff, #ddcca8);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.actions {
  margin-top: 32px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

.btn-main, .btn-secondary {
  width: 220px;
  padding: 12px;
  border-radius: 60px;
  text-decoration: none;
  font-weight: 500;
  transition: 0.25s ease;
  text-align: center;
}

.btn-main {
  background: rgba(255,255,245,0.08);
  border: 1px solid rgba(255,235,200,0.5);
  color: #fff3e0;
}
.btn-main:hover { background: #fff3e0; color: #0f0f1a; transform: scale(1.02); }

.btn-secondary {
  background: rgba(20,20,35,0.7);
  border: 1px solid rgba(255,255,255,0.2);
  color: #cdcddf;
}
.btn-secondary:hover { background: rgba(230,200,160,0.2); border-color: #e6c8a0; color: #fff; }

.footer {
  position: absolute;
  bottom: 18px;
  width: 100%;
  text-align: center;
  font-size: 0.7rem;
  color: #6a6a7c;
  z-index: 10;
}

@media (max-width: 560px) {
  .moon-svg { width: 90px; height: 90px; top: 5%; }
  .wrap { margin-top: 80px; padding: 1.3rem; }
  .logo { font-size: 1.8rem; }
  .count { font-size: 1.4rem; }
  .btn-main, .btn-secondary { width: 180px; }
}
</style>
</head>
<body>

<!-- Bulan sabit SVG (hitam dengan stroke putih) -->
<div class="moon-svg">
  <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 10 
             C 78 10, 90 35, 90 50 
             C 90 65, 78 90, 50 90 
             C 58 75, 65 62, 65 50 
             C 65 38, 58 25, 50 10 Z" 
          fill="#000000" 
          stroke="#ffffff" 
          stroke-width="2.5" 
          stroke-linejoin="round"/>
  </svg>
</div>

<div class="wrap">
  <div class="logo">LUNAVERA</div>
  <div class="tag">Quiet design. Clear presence.</div>
  <div class="hr"></div>
  <div class="head">COMING SOON</div>
  <div id="count" class="count">--d --h --m --s</div>
  <div class="actions">
    <a class="btn-main" href="https://instagram.com/" target="_blank">✨ Follow Instagram</a>
    <a class="btn-secondary" href="https://wa.me/6282336056882" target="_blank">📬 Notify WhatsApp</a>
  </div>
</div>

<div class="footer">© Lunavera — quiet presence</div>

<script>
const target = new Date("2027-06-01 00:00:00").getTime();
const el = document.getElementById("count");
setInterval(() => {
  const now = Date.now();
  const diff = target - now;
  if (diff <= 0) { el.innerHTML = "WE ARE LIVE"; return; }
  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff / (1000*60*60)) % 24);
  const mins = Math.floor((diff / (1000*60)) % 60);
  const secs = Math.floor((diff / 1000) % 60);
  el.innerHTML = `${days}d ${hours}h ${mins}m ${secs}s`;
}, 1000);
</script>
</body>
</html>
